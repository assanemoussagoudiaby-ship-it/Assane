<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <!-- NOM ONGLET -->
    <title>
        Assane Moussa Goudiaby 🇸🇳
    </title>

    <!-- LOGO ONGLET -->
    <link rel="icon"
          type="image/png"
          href="logo.png" />

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- STYLE -->
    <style>

        body{
            background:#020617;
        }

        .glass{
            background:rgba(15,23,42,0.95);
            backdrop-filter:blur(10px);
        }

        .scrollbar::-webkit-scrollbar{
            width:6px;
        }

        .scrollbar::-webkit-scrollbar-thumb{
            background:#475569;
            border-radius:20px;
        }

    </style>

</head>

<body class="text-white min-h-screen flex justify-center items-center p-4">

    <!-- APP -->
    <div class="glass w-full max-w-2xl rounded-3xl shadow-2xl border border-slate-700 p-6">

        <!-- HEADER -->
        <div class="text-center mb-6">

            <!-- DRAPEAU -->
            <div class="text-6xl mb-3">
                🇸🇳
            </div>

            <!-- LOGO -->
            <img
                src="logo.png"
                alt="AssaneDown"
                class="w-56 mx-auto rounded-2xl shadow-2xl mb-4">

            <!-- TITRE -->
            <h1 class="text-5xl font-black text-cyan-400">
                AssaneDown
            </h1>

            <p class="text-slate-400 mt-2 text-lg">
                Téléchargement intelligent de vidéos
            </p>

        </div>

        <!-- IA ASSANE -->
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 mb-5">

            <h2 class="text-cyan-300 font-bold mb-2 text-xl">
                🤖 IA Assane
            </h2>

            <p id="aiMessage"
               class="text-slate-200">
                Bienvenue sur AssaneDown 👋
            </p>

        </div>

        <!-- INPUT -->
        <div class="space-y-4">

            <input
                type="text"
                id="videoUrl"
                placeholder="Collez un lien YouTube ou TikTok..."
                class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-cyan-400">

            <!-- BOUTONS -->
            <div class="grid grid-cols-2 gap-3">

                <!-- COLLER -->
                <button
                    id="pasteBtn"
                    class="bg-slate-700 hover:bg-slate-600 p-4 rounded-2xl font-bold">

                    📋 Coller

                </button>

                <!-- EFFACER -->
                <button
                    id="clearBtn"
                    class="bg-red-500 hover:bg-red-400 text-black p-4 rounded-2xl font-bold">

                    ❌ Effacer

                </button>

                <!-- TELECHARGER -->
                <button
                    id="downloadBtn"
                    class="bg-cyan-500 hover:bg-cyan-400 text-black p-4 rounded-2xl font-black">

                    📥 Télécharger

                </button>

                <!-- DOSSIER -->
                <button
                    id="openFolderBtn"
                    class="bg-green-500 hover:bg-green-400 text-black p-4 rounded-2xl font-black">

                    📁 Downloads

                </button>

            </div>

            <!-- STATUS -->
            <div id="status"
                 class="text-center text-lg font-bold mt-2">
            </div>

        </div>

        <!-- HISTORIQUE -->
        <div class="mt-8">

            <div class="flex justify-between items-center mb-3">

                <h2 class="text-2xl font-bold text-cyan-300">

                    🕘 Historique

                </h2>

                <!-- MASQUER -->
                <button
                    id="toggleHistory"
                    class="bg-slate-700 px-4 py-2 rounded-xl">

                    Masquer

                </button>

            </div>

            <!-- CONTAINER -->
            <div id="historyContainer"
                 class="space-y-3 max-h-[300px] overflow-y-auto scrollbar">
            </div>

        </div>

        <!-- FOOTER -->
        <div class="mt-8 border-t border-slate-700 pt-5 text-center text-slate-400">

            <p class="mb-2">

                🇸🇳 AssaneDown permet de télécharger,
                lire et gérer des vidéos depuis
                YouTube, TikTok et plusieurs plateformes.

            </p>

            <p>

                Créé par Assane Moussa Goudiaby 🔥

            </p>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>

        /* =========================================
           API RENDER
        ========================================= */

        const API =
            "https://assane-down1.onrender.com";

        /* ========================================
           ELEMENTS
        ========================================= */

        const videoUrl =
            document.getElementById("videoUrl");

        const pasteBtn =
            document.getElementById("pasteBtn");

        const clearBtn =
            document.getElementById("clearBtn");

        const downloadBtn =
            document.getElementById("downloadBtn");

        const openFolderBtn =
            document.getElementById("openFolderBtn");

        const historyContainer =
            document.getElementById("historyContainer");

        const status =
            document.getElementById("status");

        const aiMessage =
            document.getElementById("aiMessage");

        const toggleHistory =
            document.getElementById("toggleHistory");

        let hidden = false;

        /* =========================================
           IA ASSANE
        ========================================= */

        function ai(text){

            aiMessage.textContent = text;

        }

        /* =========================================
           STATUS
        ========================================= */

        function show(text,color){

            status.textContent = text;

            status.style.color = color;

        }

        /* =========================================
           BIENVENUE
        ========================================= */

        window.addEventListener("load",()=>{

            const speech =
                new SpeechSynthesisUtterance(
                    "Bienvenue sur AssaneDown"
                );

            speech.lang = "fr-FR";

            speechSynthesis.speak(speech);

            ai(
                "👋 Bienvenue sur AssaneDown. Collez un lien puis cliquez sur télécharger."
            );

            loadHistory();

        });

        /* =========================================
           COLLER
        ========================================= */

        pasteBtn.addEventListener(
            "click",
            async ()=>{

                try{

                    const text =
                        await navigator
                        .clipboard
                        .readText();

                    videoUrl.value = text;

                    ai(
                        "✔ Lien collé avec succès."
                    );

                    show(
                        "Lien collé ✔",
                        "lightgreen"
                    );

                }catch{

                    show(
                        "Erreur clipboard ❌",
                        "red"
                    );

                }

            }
        );

        /* =========================================
           EFFACER
        ========================================= */

        clearBtn.addEventListener(
            "click",
            ()=>{

                videoUrl.value = "";

                ai(
                    "🗑 Champ effacé."
                );

                show(
                    "Lien supprimé ✔",
                    "orange"
                );

            }
        );

        /* =========================================
           TELECHARGER
        ========================================= */

        downloadBtn.addEventListener(
            "click",
            async ()=>{

                const url =
                    videoUrl.value.trim();

                if(!url){

                    ai(
                        "⚠ Ajoute un lien vidéo."
                    );

                    return show(
                        "Lien manquant ❌",
                        "red"
                    );

                }

                ai(
                    "⏳ Téléchargement en cours..."
                );

                show(
                    "Téléchargement...",
                    "orange"
                );

                try{

                    const res =
                        await fetch(
                            API + "/download",
                            {
                                method:"POST",

                                headers:{
                                    "Content-Type":
                                    "application/json"
                                },

                                body:JSON.stringify({
                                    url
                                })
                            }
                        );

                    const data =
                        await res.json();

                    if(data.success){

                        ai(
                            "🎉 Vidéo téléchargée avec succès."
                        );

                        show(
                            data.message,
                            "lightgreen"
                        );

                        videoUrl.value = "";

                        loadHistory();

                    }else{

                        ai(
                            "❌ Une erreur est survenue."
                        );

                        show(
                            data.message,
                            "red"
                        );

                    }

                }catch(err){

                    console.log(err);

                    ai(
                        "❌ Serveur inaccessible."
                    );

                    show(
                        "Serveur inaccessible ❌",
                        "red"
                    );

                }

            }
        );

        /* =========================================
           OUVRIR DOSSIER
        ========================================= */

        openFolderBtn.addEventListener(
            "click",
            ()=>{

                window.open(
                    API + "/open-folder"
                );

            }
        );

        /* =========================================
           HISTORIQUE
        ========================================= */

        async function loadHistory(){

            try{

                const res =
                    await fetch(
                        API + "/history"
                    );

                const data =
                    await res.json();

                historyContainer.innerHTML = "";

                data.reverse().forEach(item=>{

                    const div =
                        document.createElement("div");

                    div.className =
                        "bg-slate-800 border border-slate-700 p-4 rounded-2xl";

                    div.innerHTML = `

                        <div class="mb-3">

                            <h3 class="font-bold break-all">

                                ${item.name}

                            </h3>

                            <p class="text-slate-400 text-sm">

                                Taille :
                                ${item.size || "?"}

                            </p>

                            <p class="text-slate-400 text-sm">

                                ${item.date || ""}

                            </p>

                        </div>

                        <div class="grid grid-cols-3 gap-2">

                            <button
                                onclick="playVideo('${item.name}')"
                                class="bg-cyan-500 hover:bg-cyan-400 text-black rounded-xl p-2 font-bold">

                                ▶ Lire

                            </button>

                            <button
                                onclick="saveVideo('${item.url}')"
                                class="bg-green-500 hover:bg-green-400 text-black rounded-xl p-2 font-bold">

                                💾 Enregistrer

                            </button>

                            <button
                                onclick="deleteVideo('${item.name}')"
                                class="bg-red-500 hover:bg-red-400 text-black rounded-xl p-2 font-bold">

                                🗑 Supprimer

                            </button>

                        </div>

                    `;

                    historyContainer.appendChild(div);

                });

            }catch(err){

                console.log(err);

            }

        }

        /* =========================================
           LIRE VIDEO
        ========================================= */

        function playVideo(name){

            window.open(
                API +
                "/downloads/" +
                encodeURIComponent(name)
            );

        }

        /* =========================================
           ENREGISTRER VIDEO
        ========================================= */

        function saveVideo(url){

            const a =
                document.createElement("a");

            a.href = url;

            a.download = "";

            a.click();

        }

        /* =========================================
           SUPPRIMER VIDEO
        ========================================= */

        async function deleteVideo(name){

            const res =
                await fetch(
                    API + "/delete",
                    {
                        method:"POST",

                        headers:{
                            "Content-Type":
                            "application/json"
                        },

                        body:JSON.stringify({
                            name
                        })
                    }
                );

            const data =
                await res.json();

            ai(data.message);

            loadHistory();

        }

        /* =========================================
           MASQUER HISTORIQUE
        ========================================= */

        toggleHistory.addEventListener(
            "click",
            ()=>{

                hidden = !hidden;

                historyContainer.style.display =
                    hidden
                    ? "none"
                    : "block";

                toggleHistory.textContent =
                    hidden
                    ? "Afficher"
                    : "Masquer";

            }
        );

    </script>

</body>
</html>
