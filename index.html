<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>converti.sn</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eef2f3;
    text-align: center;
}

.dark {
    background: #1e1e1e;
    color: white;
}

.header {
    background: green;
    color: white;
    padding: 15px;
    font-size: 20px;
}

.container {
    width: 350px;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.dark .container {
    background: #2c2c2c;
}

input, button {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    background: green;
    color: white;
    border: none;
}

.country-list {
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid #ccc;
}

.country {
    display: flex;
    align-items: center;
    padding: 8px;
    cursor: pointer;
}

.country img {
    width: 25px;
    margin-right: 10px;
}

.selected {
    background: #ddd;
}

.dark .selected {
    background: #555;
}

.result {
    margin-top: 15px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="header">🇸🇳 converti.sn - Assane</div>

<div class="container">

<button onclick="toggleTheme()">🌙 / ☀️ Thème</button>

<input type="number" id="amount" placeholder="Montant">

<button onclick="toggleList('fromList')">Pays départ</button>
<div id="fromList" class="country-list" style="display:none"></div>

<button onclick="toggleList('toList')">Pays arrivée</button>
<div id="toList" class="country-list" style="display:none"></div>

<button id="convertBtn">🔄 Convertir</button>

<div id="result" class="result"></div>

</div>

/* 🌙 thème */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* afficher/masquer liste */
function toggleList(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "none") ? "block" : "none";
}

let fromCurrency = "";
let toCurrency = "";
let selectedFrom = null;
let selectedTo = null;

/* sélection pays */
function select(currency, el, isFrom){

    if(isFrom && selectedFrom) selectedFrom.classList.remove("selected");
    if(!isFrom && selectedTo) selectedTo.classList.remove("selected");

    el.classList.add("selected");

    if(isFrom){
        fromCurrency = currency;
        selectedFrom = el;
    } else {
        toCurrency = currency;
        selectedTo = el;
    }
}

/* afficher */
function show(){
    let from = document.getElementById("fromList");
    let to = document.getElementById("toList");

    countries.forEach(c=>{
        let d1 = document.createElement("div");
        let d2 = document.createElement("div");

        d1.className = "country";
        d2.className = "country";

        d1.innerHTML = `<img src="${c.flag}"> ${c.name}`;
        d2.innerHTML = `<img src="${c.flag}"> ${c.name}`;

        d1.onclick = ()=>select(c.currency, d1, true);
        d2.onclick = ()=>select(c.currency, d2, false);

        from.appendChild(d1);
        to.appendChild(d2);
    });
}

show();

/* conversion */
document.getElementById("convertBtn").addEventListener("click", ()=>{
    let amount = document.getElementById("amount").value;

    if(!fromCurrency || !toCurrency){
        result.innerText = "Choisis les pays";
        return;
    }

    let rates = {
        USD:1, EUR:1.09, GBP:1.27, XOF:0.0016, NGN:0.0007, KES:0.0067
    };

    let res = (amount * (rates[fromCurrency]||1)) / (rates[toCurrency]||1);

    result.innerText = res.toFixed(2) + " " + toCurrency;
});

</script>
