<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Assane Down Ultra Pro</title>

<style>
body{
    font-family: Arial;
    background: #0a0615;
    color: white;
    text-align: center;
    padding: 20px;
}

h1{
    font-size: 38px;
}

input{
    width: 80%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
}

button{
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

#download{ background: green; color: white; }
#historyBtn{ background: blue; color: white; }
#openBtn{ background: orange; color: black; }

video{
    width: 90%;
    margin-top: 20px;
    display: none;
    border-radius: 12px;
}

.box{
    margin-top: 20px;
    background: #1e1b2e;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>🇸🇳 Assane Down Ultra Pro</h1>

<input id="link" placeholder="Colle un lien YouTube ou MP4">

<br>

<button id="download">⬇ Télécharger</button>
<button id="openBtn">▶ Lire</button>
<button id="historyBtn">📜 Historique</button>

<video id="player" controls></video>

<div class="box" id="historyBox"></div>

<script>

const SERVER = "http://localhost:3000";

const input = document.getElementById("link");
const video = document.getElementById("player");
const historyBox = document.getElementById("historyBox");

/*
========================
▶ LECTURE VIDÉO
========================
*/
document.getElementById("openBtn").onclick = () => {

    const url = input.value.trim();

    if (!url) return alert("Lien vide");

    video.src = url;
    video.style.display = "block";
};

/*
========================
⬇ DOWNLOAD
========================
*/
document.getElementById("download").onclick = () => {

    const url = input.value.trim();

    if (!url) return alert("Lien vide");

    window.location.href =
        SERVER + "/download?url=" + encodeURIComponent(url);
};

/*
========================
📜 HISTORIQUE
========================
*/
document.getElementById("historyBtn").onclick = async () => {

    const res = await fetch(SERVER + "/history");
    const data = await res.json();

    historyBox.innerHTML = "<h3>Historique</h3>";

    data.forEach(v => {
        historyBox.innerHTML += `
            <p>
            📹 ${v.type.toUpperCase()}<br>
            🔗 ${v.url}<br>
            🕒 ${v.date}
            </p>
            <hr>
        `;
    });
};

</script>

</body>
</html>
